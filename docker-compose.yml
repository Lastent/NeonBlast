services:
  neonblast:
    build: .
    image: neonblast:latest
    container_name: neonblast
    restart: unless-stopped
    environment:
      PORT: 8080
    ports:
      # Host 8084 (libre) → contenedor 8080.
      # Cloudflared apunta a http://localhost:8084.
      # Si NO quieres exponerlo en la LAN, cambia a "127.0.0.1:8084:8080".
      - "8084:8080"
